name: Storefront CI

on:
  pull_request:
    branches: [main, v2/storefront-rebuild]
    paths:
      - "storefront/**"
      - ".github/workflows/ci-storefront.yml"

defaults:
  run:
    working-directory: ./storefront

jobs:
  ci:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.iceindustry.fr
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_fake_ci_key
